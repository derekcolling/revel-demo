<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Revel Dance Competition - Live Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Manrope', 'sans-serif'] },
                    colors: {
                        dark: '#121212',
                        surface: '#1E1E1E',
                        neonGreen: '#39FF14',
                        electricBlue: '#254EF0',
                        glowOrange: '#FF4D00'
                    }
                }
            }
        }
    </script>
    <link href="css/styles.css" rel="stylesheet">
</head>

<body class="flex flex-col min-h-screen max-w-md mx-auto overflow-x-hidden bg-dark text-white antialiased w-full">

    <!-- Header -->
    <header class="pt-6 px-6 pb-4 flex justify-center items-center">
        <img src="./62ace49c152a984444341217_Rev Nav Logo.svg" alt="Revel" class="h-8">
        <button id="alertToggle" class="hidden"></button>
        <span id="competitionName" class="hidden">Revel Dance Competition</span>
    </header>

    <main class="flex-grow px-6 space-y-6 pb-6">

        <!-- Watch Live (collapsible) -->
        <section>
            <button id="liveToggleBtn"
                class="w-full bg-surface border border-white/5 rounded-2xl px-4 py-3 flex items-center justify-between hover:bg-dark transition-colors">
                <div class="flex items-center gap-2">
                    <span class="text-lg">📺</span>
                    <span class="text-sm font-bold text-white">Watch Live</span>
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                </div>
                <svg id="liveChevron" class="w-4 h-4 text-gray-500 transition-transform duration-300" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
                </svg>
            </button>
            <div id="liveStreamContainer" class="overflow-hidden transition-all duration-300 ease-in-out"
                style="max-height: 0;">
                <div class="mt-2 rounded-2xl overflow-hidden border border-white/5 bg-black aspect-video">
                    <iframe id="liveStreamFrame" width="100%" height="100%" frameborder="0"
                        allow="autoplay; encrypted-media" allowfullscreen style="border: 0;"></iframe>
                </div>
            </div>
        </section>

        <!-- On Stage Display -->
        <section class="bg-surface rounded-3xl p-6 border border-white/5 text-center">
            <p class="text-electricBlue font-bold tracking-widest text-[10px] mb-3 uppercase">On Stage</p>
            <div class="flex items-center justify-center gap-4">
                <button id="prevDanceBtn"
                    class="w-12 h-12 rounded-xl bg-dark border border-gray-700 flex items-center justify-center text-gray-400 hover:text-white hover:border-gray-500 active:scale-90 transition-all text-2xl font-bold">&minus;</button>
                <div class="min-w-[4rem]">
                    <div class="text-6xl font-black text-white leading-none cursor-pointer hover:text-electricBlue transition-colors"
                        id="currentDanceDisplay">...</div>
                    <input type="text" id="currentDanceInput" size="4" maxlength="4"
                        class="hidden text-6xl font-black text-center bg-transparent border-b-2 border-electricBlue text-electricBlue leading-none focus:outline-none"
                        inputmode="text" placeholder="---">
                </div>
                <button id="nextDanceBtn"
                    class="w-12 h-12 rounded-xl bg-dark border border-gray-700 flex items-center justify-center text-gray-400 hover:text-white hover:border-gray-500 active:scale-90 transition-all text-2xl font-bold">+</button>
            </div>
            <p class="text-[10px] text-gray-600 mt-1" id="tapHint">Tap number to edit</p>
            <h3 class="font-bold text-sm mt-2" id="currentDanceTitle">Loading...</h3>
            <p class="text-xs text-gray-500" id="currentDanceStudio"></p>
        </section>

        <!-- Schedule Change Banner (hidden by default) -->
        <div id="scheduleChangeBanner" class="hidden">
            <div class="bg-yellow-400/10 border border-yellow-400/30 rounded-2xl px-4 py-3 flex items-center gap-3">
                <span class="text-yellow-400 text-lg">⚠️</span>
                <div class="flex-1 min-w-0">
                    <p class="text-yellow-400 font-bold text-xs">Schedule Change</p>
                    <p id="scheduleChangeText" class="text-yellow-200 text-xs">The running order has changed</p>
                </div>
                <button id="dismissBanner"
                    class="text-yellow-400/50 hover:text-yellow-400 text-lg font-bold transition-colors">&times;</button>
            </div>
        </div>

        <!-- Track a Dance -->
        <section>
            <div class="bg-surface rounded-2xl p-4 border border-white/5 relative">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Track a Dance</p>
                <div class="flex gap-2">
                    <input type="text" id="danceTrackInput" placeholder="Search by #, name, or studio"
                        class="bg-dark border border-gray-700 rounded-xl px-4 py-2.5 flex-1 min-w-0 text-sm focus:outline-none focus:border-electricBlue transition-colors"
                        autocomplete="off">
                    <button id="addTrackBtn"
                        class="bg-surface border border-gray-700 text-gray-400 font-bold px-5 rounded-xl hover:text-white hover:border-gray-500 active:scale-95 transition-all text-lg">+</button>
                </div>
                <div id="searchResults"
                    class="hidden absolute left-0 right-0 top-full mt-1 mx-4 bg-dark border border-gray-700 rounded-xl overflow-hidden z-10 max-h-60 overflow-y-auto">
                </div>
            </div>
        </section>

        <!-- Quick Add Studio -->
        <div class="flex gap-2">
            <button id="premierDanceBtn"
                class="flex-1 bg-surface border border-electricBlue/20 rounded-xl px-3 py-2.5 text-xs font-bold text-electricBlue hover:bg-electricBlue/10 active:scale-95 transition-all flex items-center justify-center gap-1.5">
                <span>💃</span> Premier — <span id="premierDayLabel">Today</span>
            </button>
            <button id="premierTomorrowBtn"
                class="flex-1 bg-surface border border-gray-700 rounded-xl px-3 py-2.5 text-xs font-bold text-gray-400 hover:bg-surface hover:text-white hover:border-gray-500 active:scale-95 transition-all flex items-center justify-center gap-1.5">
                <span>📅</span> Premier — <span id="premierTomorrowLabel">Tomorrow</span>
            </button>
        </div>

        <!-- Tracked Dances -->
        <section>
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">My Dances
                    <span class="text-electricBlue" id="trackedCount">0</span>
                </h3>
            </div>
            <div id="trackedDancesContainer" class="space-y-3">
                <p class="text-gray-600 text-sm text-center py-8">Add a dance number above to start tracking</p>
            </div>
        </section>

    </main>

    <p class="text-gray-700 text-xs text-center pb-4">No login required. Just pick your dances and watch live.</p>

    <script type="module" src="js/app.js"></script>
</body>

</html>
