<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Revel Dance Competition - Live Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Manrope', 'sans-serif'] },
                    colors: {
                        dark: '#121212',
                        surface: '#1E1E1E',
                        neonGreen: '#39FF14',
                        electricBlue: '#00E5FF',
                        glowOrange: '#FF4D00'
                    }
                }
            }
        }
    </script>
    <link href="css/styles.css" rel="stylesheet">
</head>

<body class="flex flex-col min-h-screen max-w-md mx-auto overflow-x-hidden bg-dark text-white antialiased w-full">

    <!-- Header -->
    <header class="pt-6 px-6 pb-4 flex justify-between items-center">
        <div class="flex flex-col">
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Live Competition</span>
            <h1 class="text-lg font-bold" id="competitionName">Revel Dance Competition</h1>
        </div>
        <button id="alertToggle" title="Toggle alerts"
            class="w-9 h-9 rounded-full bg-surface border border-gray-700 flex items-center justify-center text-neonGreen hover:bg-dark transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
        </button>
    </header>

    <main class="flex-grow px-6 space-y-6 pb-6">

        <!-- On Stage Display -->
        <section class="bg-surface rounded-3xl p-6 border border-white/5 text-center">
            <p class="text-electricBlue font-bold tracking-widest text-[10px] mb-3 uppercase">On Stage</p>
            <div class="flex items-center justify-center gap-4">
                <button id="prevDanceBtn"
                    class="w-12 h-12 rounded-xl bg-dark border border-gray-700 flex items-center justify-center text-gray-400 hover:text-white hover:border-gray-500 active:scale-90 transition-all text-2xl font-bold">&minus;</button>
                <div class="text-6xl font-black text-white leading-none" id="currentDanceDisplay">...</div>
                <button id="nextDanceBtn"
                    class="w-12 h-12 rounded-xl bg-dark border border-gray-700 flex items-center justify-center text-gray-400 hover:text-white hover:border-gray-500 active:scale-90 transition-all text-2xl font-bold">+</button>
            </div>
            <h3 class="font-bold text-sm mt-2" id="currentDanceTitle">Loading...</h3>
            <p class="text-xs text-gray-500" id="currentDanceStudio"></p>
        </section>

        <!-- Set Current Dance -->
        <section>
            <div class="bg-surface rounded-2xl p-4 border border-white/5">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Set Current Dance</p>
                <div class="flex gap-2">
                    <input type="text" id="currentDanceInput" placeholder="Dance # on stage"
                        class="bg-dark border border-gray-700 rounded-xl px-4 py-2.5 flex-1 min-w-0 text-sm focus:outline-none focus:border-neonGreen transition-colors"
                        inputmode="text">
                    <button id="setCurrentBtn"
                        class="bg-neonGreen text-dark font-bold px-5 rounded-xl hover:shadow-[0_0_20px_rgba(57,255,20,0.3)] active:scale-95 transition-all">
                        SET
                    </button>
                </div>
            </div>
        </section>

        <!-- Track a Dance -->
        <section>
            <div class="bg-surface rounded-2xl p-4 border border-white/5 relative">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Track a Dance</p>
                <div class="flex gap-2">
                    <input type="text" id="danceTrackInput" placeholder="Search by #, name, or studio"
                        class="bg-dark border border-gray-700 rounded-xl px-4 py-2.5 flex-1 min-w-0 text-sm focus:outline-none focus:border-electricBlue transition-colors"
                        autocomplete="off">
                    <button id="addTrackBtn"
                        class="bg-electricBlue text-dark font-bold px-5 rounded-xl hover:bg-cyan-300 active:scale-95 transition-all text-lg">+</button>
                </div>
                <div id="searchResults" class="hidden absolute left-0 right-0 top-full mt-1 mx-4 bg-dark border border-gray-700 rounded-xl overflow-hidden z-10 max-h-60 overflow-y-auto"></div>
            </div>
        </section>

        <!-- Tracked Dances -->
        <section>
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">My Dances
                    <span class="text-electricBlue" id="trackedCount">0</span>
                </h3>
            </div>
            <div id="trackedDancesContainer" class="space-y-3">
                <p class="text-gray-600 text-sm text-center py-8">Add a dance number above to start tracking</p>
            </div>
        </section>

    </main>

    <p class="text-gray-700 text-xs text-center pb-4">No login required. Just pick your dances and watch live.</p>

    <script type="module" src="js/app.js"></script>
</body>

</html>
